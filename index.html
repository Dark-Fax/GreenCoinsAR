<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { width:100%; height:100%; overflow:hidden; background:#0d1f12; }
    a-scene { width:100%; height:100%; position:absolute; }

    /* ── HUD ── */
    #hud {
      position:fixed; top:0; left:0; width:100%;
      pointer-events:none; z-index:999;
      font-family:'Courier New', monospace;
    }
    .score-bar {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 22px 0;
      background: linear-gradient(180deg, rgba(0,0,0,.55) 0%, transparent 100%);
    }
    .score-block .lbl { font-size:10px; color:#ffffff55; letter-spacing:3px; text-transform:uppercase; }
    .score-block .val { font-size:36px; font-weight:900; color:#34d399;
      text-shadow: 0 0 18px #34d39966; line-height:1; }
    .combo-block { text-align:right; }
    .combo-block .lbl { font-size:10px; color:#ffffff55; letter-spacing:3px; text-transform:uppercase; }
    .combo-block .val { font-size:22px; font-weight:700; color:#fbbf24;
      text-shadow: 0 0 12px #fbbf2466; }
    .hint-bar {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      font-size:11px; color:#ffffff35; letter-spacing:2px;
      font-family:'Courier New', monospace; text-align:center;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:.8} }

    /* Flashe de pantalla */
    .flash { position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity .08s; }
    #hit-flash  { background: radial-gradient(circle, #34d39930 0%, transparent 70%); }
    #miss-flash { background: radial-gradient(circle, #f8717130 0%, transparent 70%); }

    /* Etiquetas flotantes sobre objetos */
    .objeto-label {
      position:fixed; pointer-events:none; z-index:998;
      font-family:'Courier New', monospace; font-size:10px;
      color:#fff; background:#00000066; border:1px solid #ffffff22;
      border-radius:4px; padding:2px 6px; letter-spacing:1px;
      transform:translateX(-50%);
      display:none;
    }
  </style>
</head>
<body>

<a-scene
  physics="driver: local; gravity: -12; iterations: 20; debug: false"
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft">

  <a-assets>
    <audio id="soundAcierto" src="./acierto.mp3" preload="auto"></audio>
    <audio id="soundNya"     src="./nya.mp3"     preload="auto"></audio>
  </a-assets>

  <a-entity light="type:ambient; color:#b7f0d4; intensity:0.5"></a-entity>
  <a-entity light="type:directional; color:#ffffff; intensity:0.9; castShadow:true" position="2 6 3"></a-entity>
  <a-entity light="type:point; color:#34d399; intensity:0.4; distance:6" position="0 2 -2"></a-entity>

  <a-sky color="#0d1f12"></a-sky>
  <a-entity position="0 -4 -5">
    <a-plane width="12" height="1" color="#052e16" rotation="0 0 0" shadow="receive:true"></a-plane>
  </a-entity>

  <a-entity id="caneca-grupo" position="0 -1.8 -3.2" animation="property: scale; to: 1 1 1; dur: 100; startEvents: hit-bounce">

    <a-cone
      radius-bottom="0.32" radius-top="0.28" height="0.7"
      color="#059669" roughness="0.4" metalness="0.3"
      shadow="cast:true">
    </a-cone>

    <a-cylinder
      position="0 0 0" radius="0.285" height="0.06"
      color="#34d399" roughness="0.3" metalness="0.5">
    </a-cylinder>

    <a-torus
      position="0 0.35 0" rotation="90 0 0"
      radius="0.30" radius-tubular="0.018"
      color="#6ee7b7" metalness="0.6" roughness="0.2">
    </a-torus>

    <a-cylinder
      position="0 0.4 0" radius="0.28" height="0.05"
      color="#065f46" roughness="0.5" metalness="0.2"
      shadow="cast:true">
    </a-cylinder>

    <a-box
      position="0 0.43 0.1" width="0.25" height="0.03" depth="0.1"
      color="#022c22">
    </a-box>

    <a-cylinder
      position="0 -0.37 0" radius="0.34" height="0.06"
      color="#047857" roughness="0.6" metalness="0.1">
    </a-cylinder>

    <a-box
      id="caneca-hit"
      position="0 -0.1 0"
      width="0.62" height="0.50" depth="0.62"
      visible="false"
      static-body="mass:0">
    </a-box>

    <a-torus position="0.05 0.05 0.33" rotation="0 0 0"
      radius="0.07" radius-tubular="0.012" color="#a7f3d0"
      arc="240" start-angle="0">
    </a-torus>

  </a-entity>

  <a-box
    id="suelo-limite"
    position="0 -3.4 -3.2"
    width="14" height="0.1" depth="4"
    visible="false"
    static-body="mass:0">
  </a-box>

  <a-camera position="0 0 0" look-controls="enabled:false" wasd-controls="enabled:false"></a-camera>

</a-scene>

<div id="hud">
  <div class="score-bar">
    <div class="score-block">
      <div class="lbl">GreenCoins App</div>
      <div class="val" id="score-val">0</div>
    </div>
    <div class="combo-block">
      <div class="lbl">Combo</div>
      <div class="val" id="combo-val">×1</div>
    </div>
  </div>
</div>
<div class="hint-bar">← ARRASTRA EN LA PANTALLA PARA ATRAPAR RESIDUOS →</div>
<div class="flash" id="hit-flash"></div>
<div class="flash" id="miss-flash"></div>

<script>
(function () {
  'use strict';

  let score = 0, combo = 0;
  const residuos = new Set();

  const scene       = document.querySelector('a-scene');
  const canecaGrupo = document.getElementById('caneca-grupo');
  const canecaHit   = document.getElementById('caneca-hit');
  const scoreEl     = document.getElementById('score-val');
  const comboEl     = document.getElementById('combo-val');

  const TIPOS = [
    { label: '🟦 CARTÓN', color: '#3b82f6', emit: '#1d4ed8', geo: 'primitive:box; width:0.22; height:0.30; depth:0.22', mass: 0.4 },
    { label: '⬜ PLÁSTICO', color: '#e5e7eb', emit: '#9ca3af', geo: 'primitive:cylinder; radius:0.10; height:0.28', mass: 0.25 },
    { label: '🟡 ORGÁNICO', color: '#a3e635', emit: '#65a30d', geo: 'primitive:sphere; radius:0.13', mass: 0.35 },
    { label: '🔴 VIDRIO', color: '#f87171', emit: '#b91c1c', geo: 'primitive:cylinder; radius:0.08; height:0.35', mass: 0.6 },
    { label: '⬛ METAL', color: '#6b7280', emit: '#374151', geo: 'primitive:box; width:0.18; height:0.18; depth:0.18', mass: 0.8 },
  ];

  function screenToWorldX(clientX) {
    return ((clientX / window.innerWidth) - 0.5) * 3.0;
  }

  function moverCaneca(worldX) {
    const x = Math.max(-1.5, Math.min(1.5, worldX));
    canecaGrupo.object3D.position.x = x;
    if (canecaHit.body) {
      canecaHit.body.position.x = x;
      canecaHit.body.velocity.setZero();
    }
  }

  document.addEventListener('touchmove', e => {
    e.preventDefault();
    moverCaneca(screenToWorldX(e.touches[0].clientX));
  }, { passive: false });

  let dragging = false;
  document.addEventListener('mousedown', () => dragging = true);
  document.addEventListener('mouseup',   () => dragging = false);
  document.addEventListener('mousemove', e => {
    if (dragging) moverCaneca(screenToWorldX(e.clientX));
  });

  function spawnResiduo() {
    const tipo   = TIPOS[Math.floor(Math.random() * TIPOS.length)];
    const el     = document.createElement('a-entity');
    const spawnX = (Math.random() * 2.6) - 1.3;
    const spinZ  = (Math.random() - 0.5) * 30;

    el.setAttribute('geometry',  tipo.geo);
    el.setAttribute('material',  `color:${tipo.color}; emissive:${tipo.emit}; emissiveIntensity:0.15; roughness:0.5; metalness:0.3`);
    el.setAttribute('position',  `${spawnX} 3.5 -3.2`);
    el.setAttribute('rotation',  `${Math.random()*360} ${Math.random()*360} 0`);
    el.setAttribute('shadow',    'cast:true');
    el.setAttribute('dynamic-body', `mass:${tipo.mass}; linearDamping:0.05; angularDamping:0.1`);

    scene.appendChild(el);
    residuos.add(el);

    el.addEventListener('body-loaded', () => {
      if (el.body) {
        el.body.angularVelocity.set((Math.random()-0.5)*4, (Math.random()-0.5)*4, spinZ * 0.1);
      }
    });

    const tag = document.createElement('div');
    tag.className = 'objeto-label';
    tag.textContent = tipo.label;
    tag.style.display = 'block';
    document.body.appendChild(tag);

    const tagTick = setInterval(() => {
      if (!el.parentNode) { clearInterval(tagTick); tag.remove(); return; }
      const pos = el.object3D.getWorldPosition(new THREE.Vector3());
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const px = (pos.x / 3.5 + 0.5) * screenW;
      const py = (-pos.y / 6  + 0.5) * screenH - 24;
      tag.style.left = px + 'px';
      tag.style.top  = py + 'px';
    }, 50);

    let handled = false;
    el.addEventListener('collide', ev => {
      if (handled) return;
      const other = ev.detail.body?.el;

      if (other && other.id === 'caneca-hit') {
        handled = true;
        playAudio('#soundAcierto');
        flash('hit');
        
        // MEJORA UX: Gatillar animación física Squash & Stretch en la caneca al recibir el impacto
        canecaGrupo.removeAttribute('animation__bounce');
        canecaGrupo.setAttribute('animation__bounce', {
          property: 'scale',
          from: '1.2 0.7 1.2', // Se aplasta y se ensancha por el golpe
          to: '1 1 1',
          dur: 200,
          easing: 'easeOutElastic'
        });

        combo++;
        score += 10 * combo;
        scoreEl.textContent = score;
        comboEl.textContent = `×${combo}`;
        popParticles(tipo.color);
        destroy(el, tag, tagTick);

      } else if (other && other.id === 'suelo-limite') {
        handled = true;
        playAudio('#soundNya');
        flash('miss');
        combo = 0;
        comboEl.textContent = '×1';
        destroy(el, tag, tagTick);
      }
    });

    setTimeout(() => {
      if (!handled && el.parentNode) {
        handled = true;
        destroy(el, tag, tagTick);
      }
    }, 8000);
  }

  function destroy(el, tag, tagTick) {
    clearInterval(tagTick);
    tag.remove();
    residuos.delete(el);
    if (el.parentNode) el.parentNode.removeChild(el);
  }

  // DIFICULTAD DINÁMICA PERFECTA
  let spawnDelay = 2000;
  let lastSpawn = 0;

  function gameTick(ts) {
    if (ts - lastSpawn > spawnDelay) {
      spawnResiduo();
      lastSpawn = ts;
      // Dificultad incremental real basada en score
      if (score > 0 && score % 50 === 0) {
        spawnDelay = Math.max(700, 2000 - (score * 3));
      }
    }
    requestAnimationFrame(gameTick);
  }
  requestAnimationFrame(gameTick);

  function flash(type) {
    const el = document.getElementById(type + '-flash');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 110);
  }

  function playAudio(sel) {
    const el = document.querySelector(sel);
    if (!el) return;
    try { el.currentTime = 0; el.play(); } catch(_) {}
  }

  function popParticles(color) {
    const chars = ['✦','◆','★','·','✧'];
    for (let i = 0; i < 7; i++) {
      const p = document.createElement('div');
      p.style.cssText = `position:fixed;font-size:20px;color:${color};pointer-events:none;z-index:9999;left:50%;top:45%;`;
      p.textContent = chars[i % chars.length];
      document.body.appendChild(p);
      const angle = (i / 7) * Math.PI * 2;
      const dist  = 60 + Math.random() * 60;
      p.animate([
        { transform:`translate(-50%,-50%) scale(1)`, opacity:1 },
        { transform:`translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`, opacity:0 }
      ], { duration: 450, easing:'ease-out' }).onfinish = () => p.remove();
    }
  }
})();
</script>
</body>
</html>
